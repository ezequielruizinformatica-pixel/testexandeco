<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Controle de Ponto Escolar</title>

<link rel="stylesheet" href="style.css">

<script src="jspdf.min.js"></script>
<script src="jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<div class="container">

<aside class="menu">

<h2>🏫 Escola</h2>

<ul>

<li>Painel</li>
<li>Funcionários</li>
<li>Registros</li>
<li>Relatórios</li>

</ul>

</aside>


<main class="dashboard">

<header>

<h1>Sistema de Controle de Ponto</h1>

</header>


<section class="card">

<h2>Cadastrar Funcionário</h2>

<input type="text" id="nomeFuncionario" placeholder="Nome do funcionário">

<button onclick="adicionarFuncionario()">Cadastrar</button>

</section>


<section class="card">

<h2>Registrar Ponto</h2>

<select id="funcionarioSelect"></select>

<button class="entrada" onclick="registrarEntrada()">Entrada</button>

<button class="saida" onclick="registrarSaida()">Saída</button>

</section>


<section class="card">

<h2>Registros</h2>

<table>

<thead>

<tr>

<th>Funcionário</th>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>

</tr>

</thead>

<tbody id="tabelaRegistros"></tbody>

</table>

</section>


<section class="card">

<h2>Relatórios</h2>

<button class="pdf" onclick="exportarPDF()">Exportar PDF</button>

</section>

</main>

</div>

<script src="script.js"></script>

</body>

</html>
