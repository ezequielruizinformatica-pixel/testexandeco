<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema de Ponto Escolar</title>

<link rel="stylesheet" href="style.css">

<script src="libs/chart.js"></script>
<script src="libs/jspdf.min.js"></script>
<script src="libs/autotable.js"></script>

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<h2>🏫 Escola</h2>

<ul>

<li>Dashboard</li>
<li>Funcionários</li>
<li>Registrar Ponto</li>
<li>Relatórios</li>

</ul>

</div>


<!-- Conteúdo -->

<div class="content">

<header>

<h1>Controle de Ponto</h1>

</header>


<!-- Cards -->

<div class="cards">

<div class="card">

<h3>Funcionários</h3>
<p id="totalFuncionarios">0</p>

</div>

<div class="card">

<h3>Registros Hoje</h3>
<p id="registrosHoje">0</p>

</div>

</div>


<!-- Cadastro -->

<div class="box">

<h2>Cadastrar Funcionário</h2>

<input id="nomeFuncionario" placeholder="Nome do funcionário">

<button onclick="adicionarFuncionario()">Cadastrar</button>

</div>


<!-- Registrar ponto -->

<div class="box">

<h2>Registrar Ponto</h2>

<select id="funcionarioSelect"></select>

<button class="entrada" onclick="registrarEntrada()">Entrada</button>
<button class="saida" onclick="registrarSaida()">Saída</button>

</div>


<!-- Gráfico -->

<div class="box">

<h2>Horas Trabalhadas</h2>

<canvas id="grafico"></canvas>

</div>


<!-- Tabela -->

<div class="box">

<h2>Registros</h2>

<table>

<thead>

<tr>

<th>Funcionário</th>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>

</tr>

</thead>

<tbody id="tabelaRegistros"></tbody>

</table>

</div>


<!-- PDF -->

<div class="box">

<button onclick="exportarPDF()">Exportar Relatório PDF</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
