<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Controle de Ponto Escolar</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<div class="container">

<aside class="menu">

<h2>🏫 Escola</h2>

<ul>

<li>Painel</li>
<li>Funcionários</li>
<li>Registros</li>
<li>Relatórios</li>

</ul>

</aside>


<main class="dashboard">

<header>

<h1>Sistema de Controle de Ponto</h1>

<p id="usuarioLogado"></p>

</header>


<section class="card">

<h2>Cadastrar Funcionário</h2>

<input type="text" id="inputFuncionario" placeholder="Nome do funcionário">

<button onclick="adicionarFuncionario()">Cadastrar</button>

</section>


<section class="card">

<h2>Painel do Funcionário</h2>

<div class="botoes">

<button class="entrada" onclick="registrarEntrada()">
Registrar Entrada
</button>

<button class="saida" onclick="registrarSaida()">
Registrar Saída
</button>

<button onclick="logout()">
Sair
</button>

</div>

</section>


<section class="card">

<h2>Registros</h2>

<table>

<thead>

<tr>

<th>Funcionário</th>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>

</tr>

</thead>

<tbody id="tabelaRegistros"></tbody>

</table>

</section>


<section class="card">

<h2>Relatórios</h2>

<button onclick="exportarPDF()">
Exportar relatório PDF
</button>

</section>

</main>

</div>

<script src="script.js"></script>

</body>

</html>
