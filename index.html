<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema de Ponto - Escola</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🏫 Sistema de Controle de Ponto</h1>
<p>Funcionários da Escola</p>

</header>

<section class="painel">

<h2>Cadastrar Funcionário</h2>

<input type="text" id="nomeFuncionario" placeholder="Nome do funcionário">
<button onclick="adicionarFuncionario()">Cadastrar</button>

</section>


<section class="ponto">

<h2>Registrar Ponto</h2>

<select id="funcionarioSelect"></select>

<div class="botoes">

<button class="entrada" onclick="registrarEntrada()">Registrar Entrada</button>

<button class="saida" onclick="registrarSaida()">Registrar Saída</button>

</div>

</section>


<section class="registros">

<h2>Histórico de Registros</h2>

<table>

<thead>

<tr>

<th>Funcionário</th>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>

</tr>

</thead>

<tbody id="tabelaRegistros">

</tbody>

</table>

</section>

<script src="script.js"></script>

</body>

</html>
