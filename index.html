<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Controle de Ponto Escolar</title>

<link rel="stylesheet" href="style.css">

<script src="jspdf.min.js"></script>

</head>

<body>

<div class="app">

<header>

<h1>🏫 Controle de Ponto</h1>

</header>


<section class="card">

<h2>Cadastro de Funcionário</h2>

<input type="text" id="nomeFuncionario" placeholder="Nome do funcionário">

<button onclick="adicionarFuncionario()">Cadastrar</button>

</section>


<section class="card">

<h2>Registrar Ponto</h2>

<select id="funcionarioSelect"></select>

<div class="botoes">

<button class="entrada" onclick="registrarEntrada()">Entrada</button>

<button class="saida" onclick="registrarSaida()">Saída</button>

</div>

</section>


<section class="card">

<h2>Relatório</h2>

<button class="relatorio" onclick="gerarRelatorio()">Gerar Relatório Mensal</button>

<button class="pdf" onclick="exportarPDF()">Exportar PDF</button>

</section>


<section class="card">

<h2>Registros</h2>

<table>

<thead>

<tr>

<th>Funcionário</th>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>

</tr>

</thead>

<tbody id="tabelaRegistros"></tbody>

</table>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
